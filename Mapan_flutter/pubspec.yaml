name: mapan
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  camera: ^0.12.0+1
  connectivity_plus: ^7.1.1
  dio: ^5.9.2
  firebase_core: ^4.10.0
  firebase_messaging: ^16.3.0
  flutter:
    sdk: flutter
  flutter_image_compress: ^2.4.0
  flutter_local_notifications: ^22.0.0
  flutter_map: ^8.3.0
  flutter_map_marker_cluster: ^8.2.2
  flutter_markdown: ^0.7.7+1
  geolocator: ^14.0.2
  google_fonts: ^8.1.0
  google_sign_in: ^6.2.1
  http: ^1.2.2
  http_parser: ^4.1.2
  image: ^4.8.0
  image_cropper: ^12.2.1
  image_picker: 1.1.2
  latlong2: ^0.9.1
  onnxruntime: ^1.4.1
  open_filex: ^4.7.0
  overlay_support: ^2.1.0
  path_provider: ^2.1.6
  permission_handler: ^12.0.3
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/app_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/models/

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/app_logo.png
  color_dark: "#FFFFFF"
  image_dark: assets/app_logo.png
  android: true
  ios: true
  android_12:
    color: "#FFFFFF"
    image: assets/app_logo.png
    color_dark: "#FFFFFF"
    image_dark: assets/app_logo.png
